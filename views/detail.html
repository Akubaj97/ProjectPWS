<div class="card">
  <h2>Detail grafické karty</h2>
  <p><b>ID:</b> {{id}}</p>
  <p><b>Výrobce čipu:</b> {{vendor}}</p>
  <p><b>Značka:</b> {{brand}}</p>
  <p><b>Model:</b> {{model}}</p>
  <p><b>Cena:</b> {{price}} Kč</p>
  <p><b>Paměť:</b> {{memory}} GB</p>

  <div class="actions">
    <a href="/edit/{{id}}" class="btn-reset">Upravit</a>
    <button data-delete-id="{{id}}" class="btn-reset">Smazat</button>
  </div>
</div>
