<div class="card">
  <h2>Detail grafické karty</h2>
  <p><b>ID:</b> {{id}}</p>
  <p><b>Výrobce čipu:</b> {{vendor}}</p>
  <p><b>Značka:</b> {{brand}}</p>
  <p><b>Model:</b> {{model}}</p>
  <p><b>Paměť:</b> {{memory}} GB</p>

  <div class="actions">
    <a href="/edit/{{id}}">Upravit</a>
    <button data-delete-id="{{id}}">Smazat</button>
  </div>
</div>
