<div class="card">
  <h2>Upravit GPU #{{id}}</h2>

  <form id="editForm" data-id="{{id}}">
    <div class="row">
      <label>Výrobce čipu:</label><br />
      <select name="vendor" id="vendorSelect" required style="background:#000;color:#fff;">
        <option value="" disabled>Vyberte výrobce</option>
        <option value="Nvidia" style="color:#76B900;">Nvidia</option>
        <option value="AMD" style="color:#ED1C24;">AMD</option>
        <option value="Intel" style="color:#0071C5;">Intel</option>
      </select>
    </div>
    <div class="row">
      <label>Značka:</label><br />
      <input name="brand" id="brandInput" value="{{brand}}" required style="background:#000;color:#fff;" />
    </div>
    <div class="row">
      <label>Model:</label><br />
      <input name="model" value="{{model}}" required style="background:#000;color:#fff;" />
    </div>
    <script>
      // after the select is rendered set current value
      window.addEventListener('DOMContentLoaded', () => {
        const sel = document.getElementById('vendorSelect');
        if (sel) sel.value = `{{vendor}}`;
        const bi = document.getElementById('brandInput');
        if (bi) bi.value = `{{brand}}`;
      });
    </script>
    <div class="row">
      <label>Výrobce čipu:</label><br />
      <select name="vendor" id="vendorSelect" required>
        <option value="" disabled>Vyberte výrobce</option>
        <option value="Nvidia">Nvidia</option>
        <option value="AMD">AMD</option>
        <option value="Intel">Intel</option>
      </select>
    </div>
    <div class="row">
      <label>Paměť (GB):</label><br />
      <input type="number" name="memory" min="1" value="{{memory}}" required style="background:#000;color:#fff;" />
    </div>
    <div class="row">
      <label>Cena (Kč):</label><br />
      <input type="number" name="price" min="0" value="{{price}}" style="background:#000;color:#fff;" />
    </div>

    <button type="submit">Uložit</button>
    <button type="reset" style="margin-left:.5rem;">Vymazat pole</button>
      <a class="btn-reset" style="margin-left:.5rem;height:1.75rem;line-height:1.75rem;padding:.225rem .6rem;display:inline-block;vertical-align:middle;font-size:0.92em;" href="/gpu/{{id}}">Zpět na detail</a>
    <p class="muted" id="editMsg"></p>
  </form>
</div>
